<!DOCTYPE html>
<html>
    <head>
        <title>Verify OTP</title>
        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                text-align: center;
                font-size: medium;
                align-items: center;
            }

            .header {
                background-color: #100761;
                color: white;
                padding: 15px;
                text-align: center;
                font-weight: bold;
                border-top-left-radius: 30px;
                border-bottom-right-radius: 30px;
                margin-top: 90px;
                margin-right: 20%;
                margin-left: 20%;
                box-shadow: #100761 0px 10px 20px -10px;
            }
            .item {
                font-size: large;
                margin-top: 40px;
            }
            .item2 button {
                margin-top: 20px;
                align-items: center;
                box-shadow: #13132d 0px 10px 20px -10px;
                border-radius: 5px;
            }
            .item3 {
                margin-top: 10px;
                margin-bottom: 10px;
                padding: 8px;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1>Verify Your Identity</h1>
        </div>
        <div class="item">
            <p>We've sent a 6-digit code to your email.</p>
        </div>
        <div class="item2">
            <form method="POST">
                {% csrf_token %}
                <div class="item3">
                    <input type="text" name="otp" placeholder="Enter 6-digit OTP" maxlength="6" required style="width: 200px; height: 25px; letter-spacing: 4px;">
                </div>
                <button type="submit" style="padding: 10px 20px; background-color: #8328a7; color: white; border: none; cursor: pointer;">Verify & Login</button>
            </form>
        </div>
        {% if error %}
            <p style="color: red; margin-top: 10px;">{{ error }}</p>
        {% endif %}
    </body>
</html>
