<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber World | Dashboard</title>
    <style>
        :root {
            --primary-bg: #0a0b1e;
            --accent-blue: #00d2ff;
            --accent-purple: #9d50bb;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #1a1b3a 0%, #0a0b1e 100%);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 3px;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .logout_button button {
            background: linear-gradient(45deg, #ff4d4d, #b30000);
            color: white;
            border: none;
            padding: 10px 25px;
            cursor: pointer;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* WELCOME CARD STYLING */
        .welcome-card {
            background: var(--glass-bg);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            display: flex; 
            align-items: center;
            justify-content: space-between;
            gap: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        .welcome-text { flex: 1; }

        .welcome-video-container {
            flex: 1; 
            max-width: 450px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--accent-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            position: relative;
            /* Prevents clicking/pausing the video */
            pointer-events: none; 
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(0.9) contrast(1.1);
        }

        /* GRID STYLING */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
            animation: fadeIn 1.2s ease-out;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
        }

        .card h3 { color: var(--accent-blue); margin-top: 0; text-transform: uppercase;}

        .media-box {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 10px;
            background: #000;
            pointer-events: none;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 210, 255, 0.3);
            position: absolute;
            top: 0;
            z-index: 2;
            animation: scan 4s linear infinite;
        }

        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .welcome-card { flex-direction: column; text-align: center; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Cyber World</h1>
        <div class="logout_button">
            <button onclick="window.location.href='/admin/logout/'">DISCONNECT</button>
        </div>
    </header>

    <div class="container">
        <div class="welcome-card">
            <div class="welcome-text">
                <h2 style="margin-top:0; font-size: 2rem;">Access Granted</h2>
                <p style="font-size: 1.2rem;">
                    Welcome to the core, 
                    <span style="color: var(--accent-blue); font-weight: bold;">{{ user.username }}</span>. 
                    Your neural link is stable.
                </p>
            </div>

            <div class="welcome-video-container">
                <video autoplay muted loop playsinline id="welcomeVideo">
                    <source src="87273-601148577.mp4" type="video/mp4">
                </video>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>System Matrix Feed</h3>
                <div class="media-box">
                    <div class="scanline"></div>
                    <video autoplay muted loop playsinline>
                        <source src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-blue-data-clouds-4419-large.mp4" type="video/mp4">
                    </video>
                </div>
            </div>

            <div class="card">
                <h3>Global Traffic Map</h3>
                <div class="media-box">
                    <div class="scanline"></div>
                    <video autoplay muted loop playsinline>
                        <source src="https://assets.mixkit.co/videos/preview/mixkit-circuit-board-animation-1559-large.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Force play if browser tries to pause it
        window.addEventListener('load', () => {
            const vids = document.querySelectorAll('video');
            vids.forEach(v => v.play());
        });
    </script>
</body>
</html>
